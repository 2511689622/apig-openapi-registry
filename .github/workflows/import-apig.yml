name: import-apig

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'service name, or all'
        required: true
        default: 'software-package-server'
      community:
        description: 'community name, or all'
        required: true
        default: 'openeuler'
      dry_run:
        description: 'dry run only'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

env:
  TOOLING_REPOSITORY: 2511689622/apig-registry-tooling

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          path: registry

      - name: Checkout tooling
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          path: tooling
          token: ${{ secrets.TOOLING_REPO_TOKEN || github.token }}

      - name: Install Python dependencies
        run: python -m pip install pyyaml huaweicloudsdkcore huaweicloudsdkapig

      - name: Import APIG YAML from registry copy
        working-directory: registry
        env:
          HUAWEICLOUD_SDK_AK: ${{ secrets.HUAWEICLOUD_SDK_AK }}
          HUAWEICLOUD_SDK_SK: ${{ secrets.HUAWEICLOUD_SDK_SK }}
          HUAWEICLOUD_PROJECT_ID: ${{ vars.HUAWEICLOUD_PROJECT_ID }}
          APIG_INSTANCE_ID: ${{ vars.APIG_INSTANCE_ID }}
          OPENEULER_SOFTWARE_PACKAGE_SERVER_APIG_GROUP_ID: ${{ vars.OPENEULER_SOFTWARE_PACKAGE_SERVER_APIG_GROUP_ID }}
        run: |
          set -euo pipefail
          dry_run_flag=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            dry_run_flag="--dry-run"
          fi

          while read -r service community; do
            openapi="$(../tooling/scripts/target-paths.py "$service" "$community" openapi)"
            apig="$(../tooling/scripts/target-paths.py "$service" "$community" apig)"
            ../tooling/scripts/import-apig.sh --openapi "$openapi" --apig "$apig" $dry_run_flag
          done < <(../tooling/scripts/catalog-targets.py --service "${{ inputs.service }}" --community "${{ inputs.community }}")
