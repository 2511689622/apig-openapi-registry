name: sync-openapi

on:
  repository_dispatch:
    types: [openapi-updated]
  workflow_dispatch:
    inputs:
      service:
        description: 'service name'
        required: true
      community:
        description: 'community name'
        required: true
      repo:
        description: 'source repository, for example org/repo'
        required: false
      ref:
        description: 'source git ref or commit SHA'
        required: false
      openapi:
        description: 'source openapi path'
        required: false

permissions:
  contents: write
  pull-requests: write

env:
  TOOLING_REPOSITORY: 2511689622/apig-registry-tooling

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout registry
        uses: actions/checkout@v4
        with:
          path: registry

      - name: Checkout tooling
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TOOLING_REPOSITORY }}
          path: tooling
          token: ${{ secrets.TOOLING_REPO_TOKEN || github.token }}

      - name: Install Python dependencies
        run: python -m pip install pyyaml

      - name: Resolve target
        id: target
        working-directory: registry
        env:
          EVENT_SERVICE: ${{ github.event.client_payload.service }}
          EVENT_COMMUNITY: ${{ github.event.client_payload.community }}
          EVENT_REPO: ${{ github.event.client_payload.repo }}
          EVENT_REF: ${{ github.event.client_payload.ref }}
          EVENT_OPENAPI: ${{ github.event.client_payload.openapi }}
          INPUT_SERVICE: ${{ inputs.service }}
          INPUT_COMMUNITY: ${{ inputs.community }}
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_OPENAPI: ${{ inputs.openapi }}
        run: |
          set -euo pipefail
          service="${EVENT_SERVICE:-$INPUT_SERVICE}"
          community="${EVENT_COMMUNITY:-$INPUT_COMMUNITY}"
          repo="${EVENT_REPO:-$INPUT_REPO}"
          ref="${EVENT_REF:-$INPUT_REF}"
          openapi="${EVENT_OPENAPI:-$INPUT_OPENAPI}"

          if [[ -z "$repo" ]]; then repo="$(../tooling/scripts/target-paths.py "$service" "$community" source-repo)"; fi
          if [[ -z "$ref" ]]; then ref="$(../tooling/scripts/target-paths.py "$service" "$community" source-branch)"; fi
          if [[ -z "$openapi" ]]; then openapi="$(../tooling/scripts/target-paths.py "$service" "$community" source-openapi)"; fi
          registry_openapi="$(../tooling/scripts/target-paths.py "$service" "$community" openapi)"

          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "community=$community" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "source_openapi=$openapi" >> "$GITHUB_OUTPUT"
          echo "registry_openapi=$registry_openapi" >> "$GITHUB_OUTPUT"

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.target.outputs.repo }}
          ref: ${{ steps.target.outputs.ref }}
          path: source
          token: ${{ secrets.SOURCE_REPO_TOKEN || github.token }}

      - name: Copy and validate OpenAPI
        working-directory: registry
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${{ steps.target.outputs.registry_openapi }}")"
          cp "../source/${{ steps.target.outputs.source_openapi }}" "${{ steps.target.outputs.registry_openapi }}"
          ../tooling/scripts/validate-openapi.sh "${{ steps.target.outputs.registry_openapi }}"

      - name: Create registry PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: registry
          branch: sync/${{ steps.target.outputs.service }}/${{ steps.target.outputs.community }}
          title: "sync: ${{ steps.target.outputs.service }} ${{ steps.target.outputs.community }} OpenAPI"
          commit-message: "sync: ${{ steps.target.outputs.service }} ${{ steps.target.outputs.community }} OpenAPI"
          body: |
            Sync OpenAPI from `${{ steps.target.outputs.repo }}` at `${{ steps.target.outputs.ref }}`.

            - Service: `${{ steps.target.outputs.service }}`
            - Community: `${{ steps.target.outputs.community }}`
            - Source: `${{ steps.target.outputs.source_openapi }}`
            - Registry: `${{ steps.target.outputs.registry_openapi }}`

            This workflow only creates a PR. APIG import happens after human review and merge.
